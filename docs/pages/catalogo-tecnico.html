<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COLFLUX — Catálogo técnico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: #1a2236; background: #f8fafc; line-height: 1.6; }

    :root {
      --green:   #18735d; --green-l: #e6f4f0; --green-d: #0d4f40;
      --blue:    #1a6e9b; --blue-l:  #e6f3fb;
      --purple:  #6b4f9e; --purple-l:#f0ecfa;
      --amber:   #d97706; --amber-l: #fef3c7;
      --red:     #dc2626; --red-l:   #fee2e2;
      --gray:    #64748b; --gray-l:  #f1f5f9;
      --border:  #e2e8f0;
    }

    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.96); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border); padding: 12px 0;
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .nav-logo { font-weight: 800; font-size: 1rem; color: var(--green-d); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a { color: var(--gray); font-size: .85rem; font-weight: 500; text-decoration: none; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--green); font-weight: 700; }
    .nav-pill { background: var(--green-d); color: white; font-size: .75rem; font-weight: 700; padding: 5px 12px; border-radius: 20px; text-decoration: none; }
    @media (max-width: 600px) { .nav-links { display: none; } }

    /* ── Hero ── */
    .hero { background: #0d4f40; color: white; padding: 40px 0 32px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 4px 14px; font-size: .75rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 14px; }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; padding: 28px 0 56px; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    .sidebar { position: sticky; top: 110px; }
    .sidebar-grupo { margin-bottom: 18px; }
    .sidebar-grupo-titulo { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--gray); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .sidebar-entidad { display:block; width:100%; text-align:left; background:none; border:none; border-radius:8px; padding:7px 12px; font-size:.84rem; font-family:inherit; cursor:pointer; color:#374151; transition:all .15s; }
    .sidebar-entidad:hover { background:var(--gray-l); }
    .sidebar-entidad.active { background:var(--green-l); color:var(--green-d); font-weight:700; }

    /* ── Catálogo header ── */
    .catalogo-header { margin-bottom:20px; }
    .catalogo-header h2 { font-size:1.3rem; font-weight:800; }
    .catalogo-header p { font-size:.85rem; color:var(--gray); margin-top:4px; }

    /* ── Tabla de campos ── */
    .campo-table { width:100%; border-collapse:collapse; background:white; border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
    .campo-table th { background:var(--gray-l); padding:10px 14px; text-align:left; font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gray); border-bottom:1px solid var(--border); }
    .campo-table td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:.84rem; vertical-align:top; }
    .campo-table tr:last-child td { border-bottom:none; }
    .campo-table tr:hover td { background:var(--gray-l); }

    .campo-nombre { font-family:'JetBrains Mono',monospace; font-size:.8rem; color:var(--green-d); font-weight:600; display:flex; align-items:center; gap:6px; }
    .btn-copy { background:none; border:1px solid var(--border); border-radius:4px; padding:2px 6px; font-size:.7rem; cursor:pointer; color:var(--gray); display:none; }
    tr:hover .btn-copy { display:inline; }
    .btn-copy:hover { background:var(--green-l); color:var(--green-d); border-color:var(--green); }

    /* ── Tipo badges ── */
    .tipo-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.72rem; font-weight:700; }
    .tipo-Texto,.tipo-TextoLargo { background:#dcfce7; color:#166534; }
    .tipo-Decimal,.tipo-Entero { background:var(--blue-l); color:#1e40af; }
    .tipo-Fecha,.tipo-FechaHora { background:var(--purple-l); color:var(--purple); }
    .tipo-Booleano { background:var(--amber-l); color:#92400e; }
    .tipo-FK { background:var(--gray-l); color:#374151; }
    .tipo-URL,.tipo-Correo { background:var(--blue-l); color:#1e40af; }

    .req-check { color:var(--green-d); font-weight:700; }

    .choices-toggle { background:none; border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:.72rem; cursor:pointer; color:var(--gray); }
    .choices-toggle:hover { border-color:var(--green); color:var(--green-d); }
    .choices-list { margin-top:6px; display:none; flex-wrap:wrap; gap:4px; }
    .choices-list.open { display:flex; }

    /* ── Datos semilla ── */
    .semilla-section { margin-top: 28px; }
    .semilla-title { display: flex; align-items: center; gap: 8px; font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--gray); margin-bottom: 10px; }
    .semilla-title::before { content: ''; display: block; width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
    .semilla-table { width: 100%; border-collapse: collapse; background: white; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; font-size: .82rem; }
    .semilla-table th { background: #f0fdf4; padding: 8px 14px; text-align: left; font-size: .73rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--green-d); border-bottom: 1px solid var(--border); }
    .semilla-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .semilla-table tr:last-child td { border-bottom: none; }
    .semilla-table tr:hover td { background: var(--gray-l); }
    .choice-tag { background:var(--gray-l); border-radius:4px; padding:2px 8px; font-size:.72rem; color:#374151; }

    /* ── Search bar ── */
    .search-bar { background:white; border-bottom:1px solid var(--border); padding:14px 0; position:sticky; top:57px; z-index:90; }
    .search-inner { display:flex; gap:12px; align-items:center; }
    .search-inner input { flex:1; border:1.5px solid var(--border); border-radius:8px; padding:8px 14px; font-size:.84rem; font-family:inherit; outline:none; }
    .search-inner input:focus { border-color:var(--green); }
    .search-inner select { border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:.84rem; font-family:inherit; outline:none; }

    .highlight { background:#fef9c3; border-radius:3px; }

    /* ── Footer ── */
    footer { background: #0d1117; color: rgba(255,255,255,.5); padding: 28px 0; font-size: .82rem; }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    footer a { color: rgba(255,255,255,.6); text-decoration: none; }
    footer a:hover { color: white; }
    .footer-links { display: flex; gap: 20px; }
  </style>
</head>
<body>

<div id="app-nav"></div>

<div class="hero" style="background:#0d4f40;color:white;padding:40px 0 32px;">
  <div class="container">
    <div class="hero-badge">📖 Catálogo técnico</div>
    <h1 style="font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;margin-bottom:8px;">Catálogo <em style="color:#6ee7b7;">técnico</em> del modelo</h1>
    <p style="font-size:.9rem;color:rgba(255,255,255,.8);max-width:560px;">
      Referencia de todas las entidades y campos disponibles en la base de datos.
      Úsala para identificar a qué atributo mapear los datos de tu archivo.
    </p>
  </div>
</div>

<div class="search-bar">
  <div class="container">
    <div class="search-inner">
      <input type="text" id="searchInput" placeholder="🔍  Buscar campo o entidad…">
      <select id="grupoFilter"><option value="">Todos los grupos</option></select>
    </div>
  </div>
</div>

<div class="container">
  <div class="layout">
    <aside class="sidebar" id="sidebar"><!-- renderizado por JS --></aside>
    <main id="mainPanel"><!-- renderizado por JS --></main>
  </div>
</div>

<div id="app-footer"></div>

<script src="../assets/js/layout.js"></script>
<script src="../assets/data/catalogo.js"></script>
<script>
  let state = { grupos: [], entidadActiva: null };

  function init() {
    if (!window.CATALOGO) {
      document.getElementById('mainPanel').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--gray)">
          <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
          <h3>Catálogo no disponible</h3>
          <p style="font-size:.85rem;margin-top:6px;">Levanta Django una vez para generar <code>catalogo.js</code>.</p>
        </div>`;
      return;
    }
    state.grupos = window.CATALOGO.grupos;
    populateGrupoFilter();
    renderSidebar();
    const primera = state.grupos[0]?.entidades[0];
    if (primera) selectEntidad(primera);
  }

  function populateGrupoFilter() {
    const sel = document.getElementById('grupoFilter');
    state.grupos.forEach(g => {
      sel.innerHTML += `<option value="${g.nombre}">${g.icono} ${g.nombre}</option>`;
    });
  }

  function renderSidebar(filtroGrupo = '', query = '') {
    const sidebar = document.getElementById('sidebar');
    let html = '';
    state.grupos.forEach(grupo => {
      if (filtroGrupo && grupo.nombre !== filtroGrupo) return;
      const entidadesFiltradas = grupo.entidades.filter(e =>
        !query || e.nombre.toLowerCase().includes(query) ||
        e.verbose_name.toLowerCase().includes(query) ||
        e.campos.some(c => c.nombre.toLowerCase().includes(query) || c.verbose_name.toLowerCase().includes(query))
      );
      if (!entidadesFiltradas.length) return;
      html += `<div class="sidebar-grupo">
        <div class="sidebar-grupo-titulo">${grupo.icono} ${grupo.nombre}</div>`;
      entidadesFiltradas.forEach(e => {
        const active = state.entidadActiva?.nombre === e.nombre ? 'active' : '';
        html += `<button class="sidebar-entidad ${active}" onclick="selectEntidad(${JSON.stringify(e).replace(/"/g,'&quot;')})">${e.verbose_name || e.nombre}</button>`;
      });
      html += '</div>';
    });
    sidebar.innerHTML = html || '<p style="font-size:.82rem;color:var(--gray)">Sin resultados</p>';
  }

  function selectEntidad(entidad) {
    state.entidadActiva = entidad;
    renderSidebar(
      document.getElementById('grupoFilter').value,
      document.getElementById('searchInput').value.toLowerCase()
    );
    renderEntidad(entidad, document.getElementById('searchInput').value.toLowerCase());
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function tipoBadgeClass(tipo) {
    return 'tipo-' + tipo.replace(/ /g,'');
  }

  function renderEntidad(entidad, query = '') {
    const panel = document.getElementById('mainPanel');
    const camposFiltrados = query
      ? entidad.campos.filter(c =>
          c.nombre.toLowerCase().includes(query) ||
          c.verbose_name.toLowerCase().includes(query))
      : entidad.campos;

    const filas = camposFiltrados.map(c => {
      const nombreHl = query ? c.nombre.replace(new RegExp(query,'gi'), m=>`<mark class="highlight">${m}</mark>`) : c.nombre;
      const verboseHl = query ? c.verbose_name.replace(new RegExp(query,'gi'), m=>`<mark class="highlight">${m}</mark>`) : c.verbose_name;

      let restricciones = '';
      if (c.max_length) restricciones += `<span style="font-size:.75rem;color:var(--gray)">máx. ${c.max_length} chars</span>`;
      if (c.choices?.length) {
        const id = 'ch_' + c.nombre + '_' + entidad.nombre;
        restricciones += `<button class="choices-toggle" onclick="toggleChoices('${id}')">▼ ${c.choices.length} opciones</button>
          <div class="choices-list" id="${id}">
            ${c.choices.map(ch=>`<span class="choice-tag" title="${ch.etiqueta}">${ch.valor}</span>`).join('')}
          </div>`;
      }
      if (c.es_fk && c.modelo_fk) restricciones += `<span style="font-size:.75rem;color:var(--gray)">→ ${c.modelo_fk}</span>`;

      return `<tr>
        <td><div class="campo-nombre">
          ${nombreHl}
          <button class="btn-copy" onclick="copiar('${c.nombre}', this)" title="Copiar nombre">📋</button>
        </div></td>
        <td>${verboseHl}</td>
        <td><span class="tipo-badge ${tipoBadgeClass(c.tipo)}">${c.tipo}</span></td>
        <td style="text-align:center">${c.requerido ? '<span class="req-check">✓</span>' : ''}</td>
        <td>${restricciones}</td>
      </tr>`;
    }).join('');

    panel.innerHTML = `
      <div class="catalogo-header">
        <h2>${entidad.verbose_name || entidad.nombre}</h2>
        <p>${entidad.verbose_name_plural} · ${camposFiltrados.length} campo${camposFiltrados.length !== 1 ? 's' : ''}${query ? ' (filtrados)' : ''}</p>
      </div>
      ${camposFiltrados.length === 0
        ? '<p style="color:var(--gray);padding:40px 0;text-align:center;">Ningún campo coincide con la búsqueda</p>'
        : `<table class="campo-table">
            <thead><tr>
              <th>Campo</th><th>Nombre legible</th><th>Tipo</th>
              <th style="text-align:center">Req.</th><th>Restricciones / Opciones</th>
            </tr></thead>
            <tbody>${filas}</tbody>
          </table>`
      }
      ${renderSemilla(entidad)}`;
  }

  function renderSemilla(entidad) {
    if (!entidad.datos_semilla?.length) return '';
    const rows = entidad.datos_semilla;
    const cols = Object.keys(rows[0]);
    const ths = cols.map(c => `<th>${c}</th>`).join('');
    const trs = rows.map(r =>
      `<tr>${cols.map(c => `<td>${r[c] ?? ''}</td>`).join('')}</tr>`
    ).join('');
    return `<div class="semilla-section">
      <div class="semilla-title">Datos disponibles (${rows.length} registros)</div>
      <div style="overflow-x:auto">
        <table class="semilla-table">
          <thead><tr>${ths}</tr></thead>
          <tbody>${trs}</tbody>
        </table>
      </div>
    </div>`;
  }

  function toggleChoices(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  function copiar(texto, btn) {
    navigator.clipboard.writeText(texto).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = '📋', 1200);
    });
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const grupoFiltro = document.getElementById('grupoFilter').value;
    renderSidebar(grupoFiltro, q);
    if (state.entidadActiva) renderEntidad(state.entidadActiva, q);
  });

  document.getElementById('grupoFilter').addEventListener('change', function() {
    renderSidebar(this.value, document.getElementById('searchInput').value.toLowerCase());
  });

  init();
</script>
</body>
</html>
