<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Inventario GEI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --ink: #17202a; --accent: #18735d; --muted: #f4f7f6; }
    body { color: var(--ink); background: #fbfcfc; }
    .navbar { border-bottom: 1px solid #dfe7e4; }
    .metric { background: white; border: 1px solid #dfe7e4; border-radius: 8px; padding: 1rem; }
    .metric strong { display: block; color: var(--accent); font-size: 1.8rem; line-height: 1; }
    .table-wrap, .panel { background: white; border: 1px solid #dfe7e4; border-radius: 8px; }
    .btn-primary { background: var(--accent); border-color: var(--accent); }
    .btn-primary:hover { background: #125845; border-color: #125845; }
    canvas { max-height: 360px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{% url 'dashboard' %}">Inventario GEI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/docs/pages/data.html">Datos</a></li>
          <li class="nav-item"><a class="nav-link" href="/docs/pages/etl-upload.html">ETL</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'visualizer' %}">Visualizador</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'data-model' %}">Modelo de datos</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% for message in messages %}
      <div class="alert alert-success">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
