services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ghg
      POSTGRES_USER: ghg
      POSTGRES_PASSWORD: ghg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghg -d ghg"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py generate_catalogo && python manage.py collectstatic --noinput && gunicorn colflux.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://ghg:ghg@db:5432/ghg
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
